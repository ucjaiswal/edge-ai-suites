# Tracker Evaluation Pipeline Configuration
# Configuration for evaluating tracker on Metric Test Dataset

pipeline:
  output:
    path: /tmp/tracker-evaluation

dataset:
  class: datasets.metric_test_dataset.MetricTestDataset
  config:
    data_path: ./dataset
    cameras: [Cam_x1_0, Cam_x2_0]
    camera_fps: 30

harness:
  class: harnesses.scene_controller_harness.SceneControllerHarness
  config:
    container_image: scenescape-controller:2026.1.0-rc2
    tracker_config_path: ./dataset/tracker-config.json

evaluators:
  - class: evaluators.trackeval_evaluator.TrackEvalEvaluator
    config:
      metrics: [HOTA, MOTA, IDF1]
